name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '*.md']

jobs:
  test-dotnet:
    name: .NET Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Scribegate.slnx

      - name: Build
        run: dotnet build Scribegate.slnx --no-restore -c Release -p:SkipClientBuild=true

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage --version 18.6.2
        shell: bash

      # xUnit v3 uses Microsoft.Testing.Platform, not VSTest. The test
      # projects are executables and run directly via `dotnet run`.
      # `dotnet-coverage` instruments the process out-of-band and emits
      # Cobertura, decoupled from the in-runner extension's MTP version.
      - name: Test — Core
        run: dotnet-coverage collect -f cobertura -o coverage/core.cobertura.xml "dotnet run --no-build -c Release --project tests/Scribegate.Core.Tests"
        shell: bash

      - name: Test — Data
        run: dotnet-coverage collect -f cobertura -o coverage/data.cobertura.xml "dotnet run --no-build -c Release --project tests/Scribegate.Data.Tests"
        shell: bash

      - name: Test — Web
        run: dotnet-coverage collect -f cobertura -o coverage/web.cobertura.xml "dotnet run --no-build -c Release --project tests/Scribegate.Web.Tests"
        shell: bash

      - name: Coverage gate (.NET)
        # Soft floor only — fails if any layer drops below
        # coverage-thresholds.json. Run once per matrix leg so Windows + Linux
        # divergence shows up as two separate failures.
        run: |
          node scripts/check-coverage.mjs core coverage/core.cobertura.xml
          node scripts/check-coverage.mjs data coverage/data.cobertura.xml
          node scripts/check-coverage.mjs web coverage/web.cobertura.xml
        shell: bash

      - name: Upload .NET coverage (Cobertura)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dotnet-${{ matrix.os }}
          path: coverage/*.cobertura.xml
          if-no-files-found: error

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Scribegate.Web/Client/package-lock.json

      - name: Install dependencies
        working-directory: src/Scribegate.Web/Client
        run: npm ci --ignore-scripts

      - name: TypeScript check
        working-directory: src/Scribegate.Web/Client
        run: npx tsc --noEmit

      - name: Unit + parity tests (with coverage)
        working-directory: src/Scribegate.Web/Client
        run: npm run test:coverage

      - name: Parity-only (sanity)
        working-directory: src/Scribegate.Web/Client
        run: npm run test:parity

      - name: Coverage gate (frontend)
        run: node scripts/check-coverage.mjs frontend src/Scribegate.Web/Client/coverage/cobertura-coverage.xml

      - name: Upload frontend coverage (Cobertura)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: src/Scribegate.Web/Client/coverage/cobertura-coverage.xml
          if-no-files-found: error

  test-e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/Scribegate.Web/Client/package-lock.json
            tests/Scribegate.E2E/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/Scribegate.Web/Client
        run: npm ci --ignore-scripts

      - name: Build frontend
        working-directory: src/Scribegate.Web/Client
        run: npm run build

      - name: Copy SPA into wwwroot
        run: |
          mkdir -p src/Scribegate.Web/wwwroot
          cp -r src/Scribegate.Web/Client/dist/* src/Scribegate.Web/wwwroot/
        shell: bash

      - name: Build web host
        run: dotnet build src/Scribegate.Web -c Release -p:SkipClientBuild=true --no-restore

      - name: Install E2E dependencies
        working-directory: tests/Scribegate.E2E
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/Scribegate.E2E/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: tests/Scribegate.E2E
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: tests/Scribegate.E2E
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        working-directory: tests/Scribegate.E2E
        env:
          SKIP_CLIENT_BUILD: '1'
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/Scribegate.E2E/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: tests/Scribegate.E2E/test-results/
          if-no-files-found: ignore
          retention-days: 7

  coverage-badge:
    # Aggregate Cobertura reports from main-branch runs into a single
    # coverage.json in Shields.io endpoint format, and force-push it to the
    # `coverage-data` orphan branch. The README badge reads that file via
    # raw.githubusercontent.com.
    name: Coverage badge
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-dotnet, test-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download .NET coverage (ubuntu)
        uses: actions/download-artifact@v4
        with:
          name: coverage-dotnet-ubuntu-latest
          path: coverage/dotnet

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/frontend

      - name: Build badge JSON
        run: |
          node scripts/build-coverage-badge.mjs \
            "coverage/dotnet/core.cobertura.xml coverage/dotnet/data.cobertura.xml coverage/dotnet/web.cobertura.xml coverage/frontend/cobertura-coverage.xml" \
            coverage.json
        shell: bash

      - name: Publish coverage.json to coverage-data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISH=$(mktemp -d)
          cp coverage.json "$PUBLISH/coverage.json"
          cd "$PUBLISH"
          git init -q -b coverage-data
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add coverage.json
          git commit -q -m "coverage: update for ${GITHUB_SHA::7}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -fq origin coverage-data
        shell: bash

  publish-check:
    name: Publish (integration check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Scribegate.Web/Client/package-lock.json

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Install frontend dependencies
        working-directory: src/Scribegate.Web/Client
        run: npm ci --ignore-scripts

      - name: Build frontend
        working-directory: src/Scribegate.Web/Client
        run: npm run build

      - name: .NET publish (integration check)
        run: |
          mkdir -p src/Scribegate.Web/wwwroot
          cp -r src/Scribegate.Web/Client/dist/* src/Scribegate.Web/wwwroot/
          dotnet publish src/Scribegate.Web -c Release -o ./publish --no-restore
        shell: bash
