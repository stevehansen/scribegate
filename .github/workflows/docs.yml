name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install MkDocs and Material theme
        run: pip install mkdocs-material

      - name: Copy root docs into docs/
        run: |
          cp SECURITY.md docs/security.md
          cp CONTRIBUTING.md docs/contributing.md
          cp LICENSE.md docs/license.md
          # Root docs use GitHub-style `docs/<name>.md` links; rewrite to
          # relative paths once copied into docs/ so mkdocs --strict passes.
          sed -i -E 's#\]\(docs/([^)]+)\)#](\1)#g' docs/security.md docs/contributing.md docs/license.md

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
