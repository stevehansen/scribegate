site_name: Scribegate
site_url: https://docs.scribegate.dev
site_description: Documentation for Scribegate — a self-hosted markdown collaboration platform with editorial review workflows.
repo_url: https://github.com/stevehansen/scribegate
repo_name: stevehansen/scribegate
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started.md
      - Self-Hosting: self-hosting.md
  - Guide:
      - Product Spec: spec.md
      - Design Decisions: design-decisions.md
      - Markdown Support: markdown.md
      - API Reference: api.md
  - Technical:
      - Architecture: architecture.md
      - Security: security.md
      - Testing: testing.md
      - Contributing: contributing.md
  - Legal:
      - Imprint: legal/imprint.md
      - Privacy Policy: legal/privacy.md
      - Terms of Service: legal/terms.md
      - Acceptable Use: legal/acceptable-use.md
      - Takedown & Notice-and-Action: legal/takedown.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stevehansen/scribegate
  generator: false
